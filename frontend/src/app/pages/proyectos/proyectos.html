<!-- 🍞 TOAST -->
<div *ngIf="toast"
     class="toast-custom"
     [ngClass]="toast.type">

  {{ toast.message }}
</div>

<h2 class="mb-4">Proyectos de Investigación</h2>

<!-- 🔍 FILTROS -->
<div class="row mb-3">

  <div class="col-md-4">
    <input class="form-control"
           placeholder="Buscar por título"
           [(ngModel)]="filtroTitulo"
           (input)="pagina = 1">
  </div>

  <div class="col-md-4">
    <input class="form-control"
           placeholder="Buscar por estado (resultado)"
           [(ngModel)]="filtroEstado"
           (input)="pagina = 1">
  </div>

  <div class="col-md-4">
    <input class="form-control"
           placeholder="Buscar por investigador"
           [(ngModel)]="filtroInvestigador"
           (input)="pagina = 1">
  </div>

</div>

<!-- ➕ BOTÓN -->
<div class="mb-3">
  <button class="btn btn-success" (click)="abrirNuevo()">
    + Nuevo Proyecto
  </button>
</div>

<!-- 📋 TABLA -->
<table class="table table-striped align-middle">

  <thead>
    <tr>
      <th>Título</th>
      <th>Estado</th>
      <th>Descripción</th>
      <th>Investigadores</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let p of paginados">

      <td>{{ p.titulo }}</td>

      <td>
        <span [ngClass]="{
          'text-warning': p.resultados === 'En desarrollo',
          'text-success': p.resultados === 'Finalizado',
          'text-danger': p.resultados === 'Cancelado'
        }">
          {{ p.resultados }}
        </span>
      </td>

      <td>
        {{ p.descripcion }}
      </td>

      <td>
        <span *ngIf="p.investigadores?.length">

          <span *ngFor="let i of p.investigadores.slice(0,2); let last = last">
            {{ i.nombre }}<span *ngIf="!last">, </span>
          </span>

          <span *ngIf="p.investigadores.length > 2">
            ...
          </span>

        </span>
      </td>

      <td>

        <button class="btn btn-primary btn-sm me-2"
                (click)="abrirEditar(p)">
          Editar
        </button>

        <button class="btn btn-danger btn-sm"
                (click)="abrirModalEliminar(p.id)">
          Eliminar
        </button>

      </td>

    </tr>

  </tbody>

</table>

<!-- 📄 PAGINACIÓN -->
<div class="d-flex justify-content-center mt-3">

  <button class="btn btn-outline-primary btn-sm me-2"
          (click)="cambiarPagina(pagina - 1)">
    Anterior
  </button>

  <span class="align-self-center">
    Página {{ pagina }} de {{ totalPaginas || 1 }}
  </span>

  <button class="btn btn-outline-primary btn-sm ms-2"
          (click)="cambiarPagina(pagina + 1)">
    Siguiente
  </button>

</div>

<!-- 📦 MODAL ELIMINAR -->
<div *ngIf="modalEliminarVisible"
     class="modal fade show d-block"
     tabindex="-1"
     style="background: rgba(0,0,0,0.5);">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">
          Confirmar eliminación
        </h5>

        <button type="button"
                class="btn-close"
                (click)="cerrarModalEliminar()">
        </button>
      </div>

      <div class="modal-body">
        <p>
          ¿Seguro que deseas eliminar este proyecto?
        </p>
      </div>

      <div class="modal-footer">

        <button class="btn btn-secondary"
                (click)="cerrarModalEliminar()">
          Cancelar
        </button>

        <button class="btn btn-danger"
                (click)="confirmarEliminar()">
          Eliminar
        </button>

      </div>

    </div>

  </div>

</div>
