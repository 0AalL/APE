<h2 class="mb-4">
  Investigadores
</h2>

<!-- 👉 BOTÓN CREAR -->
<div class="mb-3">
  <button class="btn btn-success" (click)="abrirNuevo()">
    + Nuevo Investigador
  </button>
</div>

<table class="table table-striped align-middle">

  <thead>
    <tr>
      <th>Foto</th>
      <th>Nombre</th>
      <th>Cargo</th>
      <th>Correo</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let i of investigadores">

      <!-- 📸 FOTO CORRECTA -->
      <td>
        <img
          *ngIf="i.foto; else noImg"
          [src]="'http://localhost:3000/uploads/' + i.foto"
          width="60"
          height="60"
          style="object-fit: cover; border-radius: 50%;">
      </td>

      <!-- fallback si no hay imagen -->
      <ng-template #noImg>
        <div
          style="width:60px;height:60px;border-radius:50%;background:#ddd;
                 display:flex;align-items:center;justify-content:center;
                 font-size:12px;color:#666;">
          Sin foto
        </div>
      </ng-template>

      <!-- DATOS -->
      <td>{{ i.nombre }}</td>
      <td>{{ i.cargo }}</td>
      <td>{{ i.correo }}</td>

      <!-- ACCIONES -->
      <td>

        <button class="btn btn-primary btn-sm me-2" (click)="abrirEditar(i)">
          Editar
        </button>

        <button class="btn btn-danger btn-sm" (click)="eliminar(i)">
          Eliminar
        </button>

      </td>

    </tr>

  </tbody>

</table>
