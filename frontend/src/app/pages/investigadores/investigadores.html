<h2 class="mb-4">Investigadores</h2>

<!-- 🔍 FILTROS -->
<div class="row mb-3">

  <div class="col-md-4">
    <input
      type="text"
      class="form-control"
      placeholder="Buscar por nombre"
      [(ngModel)]="filtroNombre"
      (input)="pagina = 1">
  </div>

  <div class="col-md-4">
    <input
      type="text"
      class="form-control"
      placeholder="Buscar por cargo"
      [(ngModel)]="filtroCargo"
      (input)="pagina = 1">
  </div>

  <div class="col-md-4">
    <input
      type="text"
      class="form-control"
      placeholder="Buscar por correo"
      [(ngModel)]="filtroCorreo"
      (input)="pagina = 1">
  </div>

</div>

<!--  BOTÓN CREAR -->
<div class="mb-3">
  <button class="btn btn-success" (click)="abrirNuevo()">
    + Nuevo Investigador
  </button>
</div>

<!--  TABLA -->
<table class="table table-striped align-middle">

  <thead>
    <tr>
      <th>Foto</th>
      <th>Nombre</th>
      <th>Cargo</th>
      <th>Correo</th>
      <th>Acciones</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let i of investigadoresPaginados">

      <td>
        <img
          *ngIf="i.foto; else noImg"
          [src]="'http://localhost:3000/uploads/' + i.foto"
          width="60"
          height="60"
          style="object-fit: cover; border-radius: 50%;">
      </td>

      <ng-template #noImg>
        <div style="width:60px;height:60px;border-radius:50%;background:#ddd;
                    display:flex;align-items:center;justify-content:center;
                    font-size:12px;color:#666;">
          Sin foto
        </div>
      </ng-template>

      <td>{{ i.nombre }}</td>
      <td>{{ i.cargo }}</td>
      <td>{{ i.correo }}</td>

      <td>
        <button class="btn btn-primary btn-sm me-2" (click)="abrirEditar(i)">
          Editar
        </button>

        <button class="btn btn-danger btn-sm" (click)="eliminar(i)">
          Eliminar
        </button>
      </td>

    </tr>

  </tbody>

</table>

<!-- 📄 PAGINACIÓN -->
<div class="d-flex justify-content-center mt-3">

  <button class="btn btn-outline-primary btn-sm me-2"
    (click)="cambiarPagina(pagina - 1)">
    Anterior
  </button>

  <span class="align-self-center">
    Página {{ pagina }} de {{ totalPaginas || 1 }}
  </span>

  <button class="btn btn-outline-primary btn-sm ms-2"
    (click)="cambiarPagina(pagina + 1)">
    Siguiente
  </button>

</div>


<!-- CONFIRMACIÓN -->
<div class="modal d-block" *ngIf="confirmVisible"
  style="background: rgba(0,0,0,0.5);">

  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Confirmar eliminación</h5>
      </div>

      <div class="modal-body">
        ¿Eliminar a <strong>{{ nombreAEliminar }}</strong>?
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="cancelarEliminar()">
          Cancelar
        </button>

        <button class="btn btn-danger" (click)="confirmarEliminar()">
          Eliminar
        </button>
      </div>

    </div>
  </div>

</div>

<!-- MENSAJE -->
<div *ngIf="mensajeVisible"
  class="alert alert-info position-fixed bottom-0 end-0 m-3 shadow">

  {{ mensajeTexto }}

</div>
