<div class="row justify-content-center">

  <div class="col-md-8">

    <div class="card p-4">

      <h2>Contacto</h2>

      <input
        class="form-control mb-3"
        placeholder="Nombre"
        [(ngModel)]="nombre">

      <input
        class="form-control mb-3"
        placeholder="Correo"
        [(ngModel)]="correo">

      <textarea
        class="form-control mb-3"
        rows="5"
        placeholder="Mensaje"
        [(ngModel)]="mensaje">
      </textarea>

      <button
        class="btn btn-primary"
        (click)="enviar()">

        Enviar

      </button>

    </div>

  </div>

</div>
