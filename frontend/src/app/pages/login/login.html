<div class="row justify-content-center">

  <div class="col-md-4">

    <div class="card p-4">

      <h2 class="text-center mb-4">
        Iniciar Sesión
      </h2>

      <form (ngSubmit)="login()">

        <div class="mb-3">

          <label>Email</label>

          <input
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email">

        </div>

        <div class="mb-3">

          <label>Contraseña</label>

          <input
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password">

        </div>

        <button
          class="btn btn-primary w-100"
          type="submit">

          Ingresar

        </button>

      </form>

    </div>

  </div>

</div>
