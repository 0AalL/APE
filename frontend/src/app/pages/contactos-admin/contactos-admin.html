<div class="admin-page">

  <!-- HEADER -->
  <div class="admin-page-header">
    <div>
      <p class="admin-eyebrow">Administración</p>
      <h2>Mensajes</h2>
    </div>

    <div class="admin-actions">
      <span class="badge-info">
        {{ contactosFiltradosCache.length || 0 }} mensajes
      </span>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="row admin-filters">

    <div class="col-md-4">
      <input class="form-control"
             placeholder="🔍 Buscar nombre"
             [(ngModel)]="filtroNombre"
             (input)="resetPaginaYFiltrar()">
    </div>

    <div class="col-md-4">
      <input class="form-control"
             placeholder="🔍 Buscar correo"
             [(ngModel)]="filtroCorreo"
             (input)="resetPaginaYFiltrar()">
    </div>

    <div class="col-md-4">
      <input class="form-control"
             placeholder="🔍 Buscar asunto"
             [(ngModel)]="filtroAsunto"
             (input)="resetPaginaYFiltrar()">
    </div>

  </div>

  <!-- TABLE -->
  <div class="admin-table-wrapper" *ngIf="!loading">

    <table class="admin-table">

      <thead>
        <tr>
          <th>Nombre</th>
          <th>Correo</th>
          <th>Área</th>
          <th>Asunto</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>

        <!-- EMPTY -->
        <tr *ngIf="contactosPaginadosCache.length === 0">
          <td colspan="5" class="text-center py-4 text-muted">
            No hay mensajes
          </td>
        </tr>

        <!-- DATA -->
        <tr *ngFor="let c of contactosPaginadosCache">

          <td><strong>{{ c.nombre }}</strong></td>
          <td>{{ c.correo }}</td>
          <td>{{ c.areaInteres }}</td>
          <td>{{ c.asunto }}</td>

          <td>

            <button class="btn btn-table btn-view"
                    (click)="ver(c)">
              <i class="fa-solid fa-eye"></i>
              Ver
            </button>

            <button class="btn btn-table btn-delete"
                    (click)="eliminar(c.id)">
              <i class="fa-solid fa-trash"></i>
              Eliminar
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- PAGINACIÓN -->
  <div class="d-flex justify-content-center mt-3 gap-3 flex-wrap">

    <button class="btn btn-outline-primary"
            (click)="cambiarPagina(pagina - 1)"
            [disabled]="pagina === 1">
      Anterior
    </button>

    <span>
      Página {{ pagina }} de {{ totalPaginas || 1 }}
    </span>

    <button class="btn btn-outline-primary"
            (click)="cambiarPagina(pagina + 1)"
            [disabled]="pagina === totalPaginas">
      Siguiente
    </button>

  </div>

</div>
