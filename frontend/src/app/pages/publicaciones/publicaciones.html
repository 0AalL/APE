<div class="admin-page">

  <!-- HEADER -->
  <div class="admin-page-header">
    <div>
      <p class="admin-eyebrow">Administración</p>
      <h2>Publicaciones</h2>
    </div>

    <div class="admin-actions">
      <a class="btn-action" routerLink="/admin/publicaciones/nueva">
        <i class="fa-solid fa-plus"></i>
        Nueva Publicación
      </a>
    </div>
  </div>

  <!-- FILTROS (SIEMPRE VISIBLES) -->
  <div class="row admin-filters mb-3">

    <div class="col-md-4">
      <input class="form-control"
             placeholder="🔍 Buscar por título"
             [(ngModel)]="filtroTitulo"
             (input)="resetPaginaYFiltrar()">
    </div>

    <div class="col-md-4">
      <input class="form-control"
             placeholder="🔍 Buscar por revista"
             [(ngModel)]="filtroRevista"
             (input)="resetPaginaYFiltrar()">
    </div>

    <div class="col-md-4">
      <input class="form-control"
             placeholder="🔍 Buscar por DOI"
             [(ngModel)]="filtroDOI"
             (input)="resetPaginaYFiltrar()">
    </div>

  </div>

  <!-- TABLE WRAPPER -->
  <div class="admin-table-wrapper">

    <!-- spinner pequeño (NO bloquea UI) -->
    <div *ngIf="loading" class="table-loading-overlay">
      <i class="fa-solid fa-spinner fa-spin"></i>
      Cargando...
    </div>

    <table class="admin-table">

      <thead>
        <tr>
          <th>Título</th>
          <th>Revista</th>
          <th>Autores</th>
          <th>Fecha</th>
          <th>DOI</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody>

        <!-- EMPTY -->
        <tr *ngIf="!loading && publicacionesPaginadasCache.length === 0">
          <td colspan="6" class="text-center py-4 text-muted">
            No hay publicaciones
          </td>
        </tr>

        <!-- DATA -->
        <tr *ngFor="let p of publicacionesPaginadasCache">

          <td><strong>{{ p.titulo }}</strong></td>
          <td>{{ p.revista }}</td>
          <td>{{ p.autores }}</td>
          <td>{{ p.fechaPublicacion | date:'dd/MM/yyyy' }}</td>
          <td><code>{{ p.doi }}</code></td>

          <td>
            <a class="btn btn-table btn-edit"
               [routerLink]="['/admin/publicaciones/editar', p.id]">
              <i class="fa-solid fa-pen-to-square"></i>
              Editar
            </a>

            <button class="btn btn-table btn-delete"
                    (click)="eliminar(p.id)">
              <i class="fa-solid fa-trash"></i>
              Eliminar
            </button>
          </td>

        </tr>

      </tbody>

    </table>

  </div>

  <!-- PAGINACIÓN -->
  <div class="d-flex justify-content-center mt-3 gap-3 flex-wrap"
       *ngIf="totalPaginas > 1">

    <button class="btn btn-outline-primary"
            (click)="cambiarPagina(pagina - 1)"
            [disabled]="pagina === 1">
      Anterior
    </button>

    <span>
      Página {{ pagina }} de {{ totalPaginas }}
    </span>

    <button class="btn btn-outline-primary"
            (click)="cambiarPagina(pagina + 1)"
            [disabled]="pagina === totalPaginas">
      Siguiente
    </button>

  </div>

</div>
