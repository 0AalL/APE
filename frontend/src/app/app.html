<div class="app-container">

  <!-- 🔵 TODO EL LAYOUT SOLO SI NO ES LOGIN -->
  <ng-container *ngIf="mostrarLayout; else loginOnly">

    <!-- 🔵 NAVBAR PÚBLICO -->
    <app-navbar
      *ngIf="!mostrarAdmin">
    </app-navbar>

    <!-- 🟣 SIDEBAR ADMIN -->
    <app-menu-admin
      *ngIf="mostrarAdmin"
      [collapsed]="adminCollapsed"
      (collapsedChange)="adminCollapsed = $event">
    </app-menu-admin>

    <!-- 🟢 CONTENIDO -->
    <main
      class="content"
      [class.admin-mode]="mostrarAdmin"
      [class.admin-collapsed]="adminCollapsed">

      <div class="container mt-4">
        <router-outlet></router-outlet>
      </div>

    </main>

    <!-- 🔵 FOOTER PÚBLICO -->
    <app-footer
      *ngIf="!mostrarAdmin">
    </app-footer>

  </ng-container>

  <!-- 🔴 SOLO LOGIN (SIN LAYOUT) -->
  <ng-template #loginOnly>
    <router-outlet></router-outlet>
  </ng-template>

</div>
