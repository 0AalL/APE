<div class="modal-backdrop" *ngIf="visible">

  <div class="modal-box">

    <h3 class="mb-3">
      {{ isEdit ? 'Editar Investigador' : 'Nuevo Investigador' }}
    </h3>

    <!-- 🖼️ FOTO (AL INICIO) -->
    <div class="mb-3 text-center">

      <input
        type="file"
        class="form-control mb-2"
        (change)="onFileSelected($event)">

      <img
        *ngIf="preview"
        [src]="preview"
        class="img-thumbnail"
        style="max-width: 120px; border-radius: 10px;">

    </div>

    <!-- 📋 CAMPOS -->
    <input class="form-control mb-2" placeholder="Nombre"
      [(ngModel)]="investigador.nombre">

    <input class="form-control mb-2" placeholder="Cargo"
      [(ngModel)]="investigador.cargo">

    <input class="form-control mb-2" placeholder="Correo"
      [(ngModel)]="investigador.correo">

    <input class="form-control mb-2" placeholder="ORCID"
      [(ngModel)]="investigador.orcid">

    <input class="form-control mb-2" placeholder="Facebook"
      [(ngModel)]="investigador.facebook">

    <input class="form-control mb-2" placeholder="LinkedIn"
      [(ngModel)]="investigador.linkedin">

    <input class="form-control mb-2" placeholder="Instagram"
      [(ngModel)]="investigador.instagram">

    <input class="form-control mb-2" placeholder="Telegram"
      [(ngModel)]="investigador.telegram">

    <textarea class="form-control mb-3"
      rows="4"
      placeholder="Biografía"
      [(ngModel)]="investigador.biografia">
    </textarea>

    <!-- 🔘 BOTONES -->
    <div class="d-flex justify-content-between">

      <button class="btn btn-secondary" (click)="cerrar()">
        Cancelar
      </button>

      <button class="btn btn-success" (click)="guardar()">
        {{ isEdit ? 'Actualizar' : 'Guardar' }}
      </button>

    </div>

  </div>

</div>
