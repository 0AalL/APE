<div class="container mt-4">

  <div class="card shadow">
    <div class="card-header">
      <h3 class="mb-0">{{ editMode ? 'Editar Publicación' : 'Crear Publicación' }}</h3>
    </div>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="guardar()">

        <!-- TÍTULO -->
        <div class="mb-3">
          <label class="form-label">Título *</label>
          <input class="form-control" placeholder="Mínimo 5 caracteres" formControlName="titulo">
          <div class="text-danger small" *ngIf="form.get('titulo')?.invalid && form.get('titulo')?.touched">
            Mínimo 5 caracteres requeridos
          </div>
        </div>

        <!-- RESUMEN -->
        <div class="mb-3">
          <label class="form-label">Resumen *</label>
          <textarea class="form-control" rows="4" placeholder="Mínimo 20 caracteres" formControlName="resumen"></textarea>
          <div class="text-danger small" *ngIf="form.get('resumen')?.invalid && form.get('resumen')?.touched">
            Mínimo 20 caracteres requeridos
          </div>
        </div>

        <!-- REVISTA -->
        <div class="mb-3">
          <label class="form-label">Revista *</label>
          <input class="form-control" placeholder="Nombre de la revista" formControlName="revista">
          <div class="text-danger small" *ngIf="form.get('revista')?.invalid && form.get('revista')?.touched">
            Mínimo 3 caracteres requeridos
          </div>
        </div>

        <!-- DOI -->
        <div class="mb-3">
          <label class="form-label">DOI *</label>
          <input class="form-control" placeholder="ej: 10.1234/ejemplo" formControlName="doi">
          <div class="text-danger small" *ngIf="form.get('doi')?.invalid && form.get('doi')?.touched">
            Mínimo 5 caracteres requeridos
          </div>
        </div>

        <!-- FECHA PUBLICACIÓN -->
        <div class="mb-3">
          <label class="form-label">Fecha de Publicación *</label>
          <input type="date" class="form-control" formControlName="fechaPublicacion">
          <div class="text-danger small" *ngIf="form.get('fechaPublicacion')?.invalid && form.get('fechaPublicacion')?.touched">
            Fecha requerida
          </div>
        </div>

        <!-- AUTORES -->
        <div class="mb-3">
          <label class="form-label">Autores *</label>
          <input class="form-control" placeholder="ej: Juan Pérez, María López" formControlName="autores">
          <div class="text-danger small" *ngIf="form.get('autores')?.invalid && form.get('autores')?.touched">
            Mínimo 5 caracteres requeridos
          </div>
        </div>

        <!-- PROYECTO -->
        <div class="mb-3">
          <label class="form-label">Proyecto *</label>
          <input type="number" class="form-control" placeholder="ID del proyecto" formControlName="proyectoId">
          <div class="text-danger small" *ngIf="form.get('proyectoId')?.invalid && form.get('proyectoId')?.touched">
            ID del proyecto requerido
          </div>
        </div>

        <!-- BOTONES -->
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="form.invalid || loading">
            <i class="fa-solid fa-floppy-disk"></i>
            {{ loading ? 'Guardando...' : 'Guardar' }}
          </button>
          <button type="button" class="btn btn-secondary" (click)="cancelar()">
            <i class="fa-solid fa-times"></i>
            Cancelar
          </button>
        </div>

      </form>
    </div>
  </div>

</div>
