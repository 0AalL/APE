<div class="modal-backdrop" *ngIf="visible">

  <div class="modal-box">

    <h3 class="mb-3">
      {{ isEdit ? 'Editar Proyecto' : 'Nuevo Proyecto' }}
    </h3>

    <!-- TÍTULO -->
    <input class="form-control mb-2"
      placeholder="Título"
      [(ngModel)]="proyecto.titulo">

    <!-- 👥 INVESTIGADORES -->
    <div class="mb-2">

      <label>Investigadores</label>

      <div class="d-flex mb-2">

        <button class="btn btn-primary"
          (click)="abrirBuscador()">
          Buscar investigador
        </button>

      </div>

      <!-- seleccionados -->
      <div>
        <span class="badge bg-secondary me-1"
          *ngFor="let i of proyecto.investigadores; let idx = index">

          {{ i.nombre }}

          <button class="btn btn-sm btn-danger ms-1"
            (click)="eliminarInvestigador(idx)">
            x
          </button>

        </span>
      </div>

    </div>

    <!-- 📄 DESCRIPCIÓN -->
    <textarea class="form-control mb-2"
      placeholder="Descripción"
      [(ngModel)]="proyecto.descripcion"></textarea>

    <!-- 🎯 OBJETIVOS -->
    <textarea class="form-control mb-2"
      placeholder="Objetivos"
      [(ngModel)]="proyecto.objetivos"></textarea>

    <!-- 📊 RESULTADOS -->
    <textarea class="form-control mb-3"
      placeholder="Resultados"
      [(ngModel)]="proyecto.resultados"></textarea>

    <!-- BOTONES -->
    <div class="d-flex justify-content-between">

      <button class="btn btn-secondary" (click)="cerrar()">
        Cancelar
      </button>

      <button class="btn btn-success" (click)="guardar()">
        {{ isEdit ? 'Actualizar' : 'Guardar' }}
      </button>

    </div>

  </div>

</div>

<!-- 🔎 MODAL BUSCADOR INVESTIGADORES -->
<div class="modal-backdrop" *ngIf="buscadorVisible">

  <div class="modal-box">

    <h4>Buscar Investigador</h4>

    <!-- filtros -->
    <div class="row mb-2">

      <div class="col">
        <input class="form-control"
          placeholder="Buscar por nombre"
          [(ngModel)]="filtroNombre"
          (input)="filtrar()">
      </div>

      <div class="col">
        <input class="form-control"
          placeholder="Buscar por cédula"
          [(ngModel)]="filtroCedula"
          (input)="filtrar()">
      </div>

      <div class="col">
        <input class="form-control"
          placeholder="Buscar por cargo"
          [(ngModel)]="filtroCargo"
          (input)="filtrar()">
      </div>

    </div>

    <!-- tabla -->
    <table class="table table-sm">

      <thead>
        <tr>
          <th>Nombre</th>
          <th>Cédula</th>
          <th>Cargo</th>
          <th></th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let i of paginados">

          <td>{{ i.nombre }}</td>
          <td>{{ i.cedula }}</td>
          <td>{{ i.cargo }}</td>

          <td>
            <button class="btn btn-success btn-sm"
              (click)="seleccionarInvestigador(i)">
              Agregar
            </button>
          </td>

        </tr>

      </tbody>

    </table>

    <!-- paginación -->
    <div class="d-flex justify-content-between">

      <button class="btn btn-outline-primary btn-sm"
        (click)="pagina = pagina - 1"
        [disabled]="pagina === 1">
        Anterior
      </button>

      <span>Página {{ pagina }}</span>

      <button class="btn btn-outline-primary btn-sm"
        (click)="pagina = pagina + 1"
        [disabled]="pagina >= totalPaginas">
        Siguiente
      </button>

    </div>

    <div class="mt-2 text-end">

      <button class="btn btn-secondary"
        (click)="buscadorVisible = false">
        Cerrar
      </button>

    </div>

  </div>

</div>
